name: Forge Validated Coverage Report
                                       
on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday 8am CST / 9am CDT
  workflow_dispatch:                                      
                                                                                                                                                                   
jobs:
  generate-report:                                                                                                                                                 
    runs-on: ubuntu-latest                                                                                                                                       
    permissions:          
      contents: write
                       
    steps:
      - name: Checkout
        uses: actions/checkout@v5
                                   
      - name: Generate coverage report
        run: python3 scripts/generate_report.py                                                                                                                    
                                               
      - name: Commit and push                                                                                                                                      
        run: |                                                                                                                                                   
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md                                                   
          git diff --staged --quiet || git commit -m "chore: weekly forge validated coverage report $(date +%Y-%m-%d)"                                             
          git push 
