 # .github/workflows/request-validation.yml                                                                                                                         
  name: Request Module Validation                                                                                                                                    
                                                                                                                                                                     
  on:                                                                                                                                                                
    workflow_dispatch:                                                                                                                                               
      inputs:
        module_name:
          description: "Module slug (e.g. puppet-rsyslog)"                                                                                                           
          required: true
          type: string                                                                                                                                               
                                                                                                                                                                   
  jobs:
    request-validation:
      runs-on: ubuntu-latest
      permissions:
        contents: write
                                                                                                                                                                     
      steps:
        - name: Check org membership                                                                                                                                 
          uses: actions/github-script@v7                                                                                                                           
          with:
            github-token: ${{ secrets.CROSS_REPO_TOKEN }}
            script: |
              try {
                await github.rest.orgs.checkMembershipForUser({                                                                                                      
                  org: 'puppetlabs-seteam',
                  username: context.actor                                                                                                                            
                });                                                                                                                                                
                core.info(`✅ ${context.actor} is a member of puppetlabs-seteam`);
              } catch (e) {                                                                                                                                          
                core.setFailed(`❌ ${context.actor} is not a member of puppetlabs-seteam`);
              }                                                                                                                                                      
                                                                                                                                                                   
        - name: Checkout                                                                                                                                             
          uses: actions/checkout@v4
                                                                                                                                                                     
        - name: Add module to modules.yaml                                                                                                                         
          id: add_module
          run: |
            MODULE="${{ inputs.module_name }}"
            if grep -q "^  - ${MODULE}$" modules.yaml; then
              echo "⚠️  ${MODULE} is already in the list — skipping"                                                                                                  
              echo "already_exists=true" >> $GITHUB_OUTPUT
            else                                                                                                                                                     
              echo "  - ${MODULE}" >> modules.yaml                                                                                                                 
              echo "already_exists=false" >> $GITHUB_OUTPUT                                                                                                          
            fi
                                                                                                                                                                     
        - name: Commit and push                                                                                                                                    
          if: steps.add_module.outputs.already_exists == 'false'
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"                                                                                     
            git add modules.yaml
            git commit -m "feat: add ${{ inputs.module_name }} to validation request list"                                                                           
            git push                                                                                                                                                 
  
        - name: Open issue on puppet-module-compat-harness                                                                                                           
          if: steps.add_module.outputs.already_exists == 'false'                                                                                                   
          uses: actions/github-script@v7
          with:
            github-token: ${{ secrets.CROSS_REPO_TOKEN }}
            script: |                                                                                                                                                
              const module = '${{ inputs.module_name }}';
              const [author, name] = module.split('-');                                                                                                              
              const forgeUrl = `https://forge.puppet.com/modules/${author}/${name}`;                                                                                 
  
              await github.rest.issues.create({                                                                                                                      
                owner: 'puppetlabs',                                                                                                                               
                repo: 'puppet-module-compat-harness',
                title: `Validation Request: ${module}`,                                                                                                              
                body: [
                  '## Module Validation Request',                                                                                                                    
                  '',                                                                                                                                              
                  `**Module:** \`${module}\``,
                  `**Forge:** ${forgeUrl}`,
                  `**Requested by:** @${context.actor}`,                                                                                                             
                ].join('\n')
              });                                                                                                                                                    
              core.info(`✅ Issue opened on puppetlabs/puppet-module-compat-harness`); 
